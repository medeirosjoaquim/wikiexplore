name: wikipulse

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wikipulse}
      POSTGRES_USER: ${POSTGRES_USER:-wikipulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikipulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikipulse} -d ${POSTGRES_DB:-wikipulse}"]
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: wikipulse-kafka-cluster
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 10s
      retries: 30

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

  backend-init:
    build:
      context: ./backend
    command: python /app/scripts/init_all.py
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts:ro
      - ./backend:/app
    restart: "no"

  backend-api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: wikipulse-api
      OTEL_SERVICE_INSTANCE: api
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://tempo:4318/v1/traces
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Streaming pipeline (stateless, independently restartable) ──
  producer:
    build:
      context: ./backend
    command: python -m app.services.producer
    environment:
      OTEL_SERVICE_NAME: wikipulse-producer
      METRICS_PORT: "9101"
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    restart: unless-stopped

  demux:
    build:
      context: ./backend
    command: python -m app.services.demux
    environment:
      OTEL_SERVICE_NAME: wikipulse-demux
      METRICS_PORT: "9102"
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    restart: unless-stopped

  indexer:
    build:
      context: ./backend
    command: python -m app.services.indexer
    environment:
      OTEL_SERVICE_NAME: wikipulse-indexer
      METRICS_PORT: "9103"
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    restart: unless-stopped

  analytics:
    build:
      context: ./backend
    command: python -m app.services.analytics
    environment:
      OTEL_SERVICE_NAME: wikipulse-analytics
      METRICS_PORT: "9104"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    restart: unless-stopped

  vandalism:
    build:
      context: ./backend
    command: python -m app.services.vandalism
    environment:
      OTEL_SERVICE_NAME: wikipulse-vandalism
      METRICS_PORT: "9105"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
    command: python -m app.services.scheduler
    environment:
      OTEL_SERVICE_NAME: wikipulse-scheduler
      METRICS_PORT: "9106"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Observability ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API (Grafana datasource)
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (services export here)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  grafana:
    image: grafana/grafana-oss:11.4.0
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  elasticsearch_data:
  kafka_data:
  prometheus_data:
  tempo_data:
  grafana_data:
