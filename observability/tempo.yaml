# Grafana Tempo — distributed trace backend.
# Receives OpenTelemetry traces over OTLP (gRPC :4317, HTTP :4318) from every
# WikiPulse service and serves them to Grafana over the Tempo query API (:3200).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
