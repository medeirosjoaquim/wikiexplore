[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008"]  # B008: Depends(...) defaults are idiomatic FastAPI

[tool.ruff.lint.per-file-ignores]
"migrations/versions/*" = ["E", "F", "W", "I", "UP", "B", "SIM"]
"migrations/env.py" = ["E402", "I001"]

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = "migrations/versions"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = false
check_untyped_defs = false
exclude = "migrations/versions"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
